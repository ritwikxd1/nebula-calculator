<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

    <div class="header">
        <h1>Nebula Calculator</h1>
        <p>Modern Calculator</p>
    </div>

    <input type="text" id="display" class="display" readonly>

    <div class="buttons">
        <button class="clear">C</button>
        <button>%</button>
        <button>/</button>
        <button class="operator">×</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">−</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">+</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>⌫</button>

        <button>0</button>
        <button>.</button>
        <button class="equal">=</button>
    </div>

    <div class="credit">
        Design & Coded by Ritwik
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
